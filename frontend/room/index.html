<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChatService</title>
  <link rel="stylesheet" href="../styles.css" />
</head>
<body>
  <main class="page">
    <header class="hero panel">
      <div class="hero__left">
        <div class="hero-topline">
          <p class="eyebrow">🏠 Room Service</p>
          <div class="top-actions">
            <div id="sessionPill" class="session-pill disconnected"><span class="dot"></span>Not signed in</div>
            <button class="secondary compact" onclick="goHome()">← Home</button>
          </div>
        </div>
        <h1>Rooms</h1>
        <p class="subtitle">Enter an existing Room ID/name + password to join. If the room does not exist, a new room will be created.</p>
        <div class="inline-form">
          <input id="roomIdInput" type="text" placeholder="Room ID or room name" onkeydown="handleRoomInputKey(event)" />
          <input id="roomPasswordInput" type="password" placeholder="Room Password" onkeydown="handleRoomInputKey(event)" />
          <button id="enterRoomButton" class="primary" onclick="enterRoom()">Join / Create</button>
        </div>
      </div>
    </header>

    <section class="panel chat-card">
      <div class="section-title"><h2>Your Created Rooms</h2></div>
      <div id="roomList" class="room-list"><div class="chat-empty">Sign in to load rooms.</div></div>
    </section>

    <section class="panel output-card">
      <div class="section-title">
        <h2>Output</h2>
        <button class="secondary" onclick="clearOutput()">Clear</button>
      </div>
      <pre id="output">Ready.</pre>
    </section>
  </main>

  <script src="./room.js"></script>
</body>
</html>
