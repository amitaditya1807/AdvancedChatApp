<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Advance Chat App - Home</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="page">
    <header class="hero panel">
      <div class="hero__left">
        <div class="hero-topline">
          <p class="eyebrow">🚀 API Gateway + Microservices</p>
          <div id="sessionPill" class="session-pill disconnected"><span class="dot"></span>Not signed in</div>
        </div>
        <h1>WorkSpace</h1>
        <p class="subtitle">Sign in, verify chat service, and open room features from one place.</p>
        <div class="actions">
          <button class="primary" onclick="login()">Continue with Google</button>
          <button id="chatButton" class="secondary" onclick="callChatService()">Check Chat Service</button>
          <button class="danger" onclick="logout()">Logout</button>
        </div>
      </div>
    </header>

    <section class="panel chat-card">
      <div class="section-title"><h2>Features</h2></div>
      <div class="grid">
        <div class="mini-card">
          <strong>ChatService</strong>
          <span>Create/join rooms, manage your rooms, and open live chat page.</span>
          <div style="margin-top:12px;"><button id="roomServiceButton" class="primary" onclick="openRoomService()">Open ChatService</button></div>
        </div>
      </div>
    </section>

    <section class="panel output-card">
      <div class="section-title"><h2>API Response</h2><button class="secondary" onclick="clearOutput()">Clear</button></div>
      <pre id="output">Ready. Click “Continue with Google” to sign in.</pre>
    </section>
  </main>

  <script src="./main.js"></script>
</body>
</html>
