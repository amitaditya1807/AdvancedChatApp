<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Advance Chat App - Home</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="page">
    <header class="hero panel">
      <div class="hero__left">
        <p class="eyebrow">🚀 API Gateway + Microservices</p>
        <h1>Advance Chat App</h1>
        <p class="subtitle">
          Secure chat with JWT auth, rooms, and real-time conversation.
        </p>
      </div>
    </header>

    <section class="panel chat-card">
      <div class="section-title">
        <h2>Features</h2>
      </div>

      <div class="grid">
        <div class="mini-card">
          <strong>Room Service</strong>
          <span>Create or join room using Room ID + Password.</span>
          <div style="margin-top: 12px;">
            <a href="./room/index.html">
              <button class="primary">Open Room Service</button>
            </a>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script src="./main.js"></script>
</body>
</html>
